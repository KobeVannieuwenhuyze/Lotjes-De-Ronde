<!DOCTYPE html>

<html lang="nl-NL">
    <head>
        <meta charset="utf-8" />
        <title>Lotjes de Ronde</title>
        <link rel="stylesheet" href="index.css" />
        <script src="index.js" type="module"></script>
    </head>
    <body>
        <main>
            <!-- Success -->
            <div class="success-screen" id="success-screen">
                <div class="success-icon">🎉</div>
                <h2>Inzending opgeslagen!</h2>
                <p id="success-naam"></p>
                <button class="btn-new" onclick="resetForm()">Nieuwe inzending</button>
            </div>
            
            <div id="form-wrap">
            
                <!-- gegevens -->
                <div class="sec-label">gegevens</div>
                <div class="card">
                    <div class="field">
                        <label for="naam">Naam</label>
                        <div class="ac-wrap" id="wrap-naam">
                        <input class="ac-input" type="text" id="naam" placeholder="Kobe Vannieuwenhuyze" autocomplete="off">
                        <div class="ac-dropdown" id="drop-naam"></div>
                        </div>
                    </div>

                    <div class="field">
                        <label for="gsm">GSM</label>
                        <input type="tel" id="gsm" placeholder="0471 58 41 60" autocomplete="tel">
                    </div>
                </div>
            
                <!-- Top 3 -->
                <div class="sec-label">Top 3 renners</div>
                <div class="card">
                <p style="font-size:.75rem;color:var(--muted);margin-bottom:.9rem;line-height:1.5;">
                    Volgorde maakt niet uit.
                </p>
                <div class="top3">
            
                    <div class="renner-row">
                    <div class="renner-badge r1">1</div>
                    <div class="field" style="margin:0">
                        <label>Renner 1</label>
                        <div class="ac-wrap" id="wrap1">
                        <input class="ac-input" type="text" id="renner1" placeholder="Typ om te zoeken…" autocomplete="off">
                        <div class="ac-dropdown" id="drop1"></div>
                        </div>
                    </div>
                    </div>
            
                    <div class="renner-row">
                    <div class="renner-badge r2">2</div>
                    <div class="field" style="margin:0">
                        <label>Renner 2</label>
                        <div class="ac-wrap" id="wrap2">
                        <input class="ac-input" type="text" id="renner2" placeholder="Typ om te zoeken…" autocomplete="off">
                        <div class="ac-dropdown" id="drop2"></div>
                        </div>
                    </div>
                    </div>
            
                    <div class="renner-row">
                    <div class="renner-badge r3">3</div>
                    <div class="field" style="margin:0">
                        <label>Renner 3</label>
                        <div class="ac-wrap" id="wrap3">
                        <input class="ac-input" type="text" id="renner3" placeholder="Typ om te zoeken…" autocomplete="off">
                        <div class="ac-dropdown" id="drop3"></div>
                        </div>
                    </div>
                    </div>
            
                </div>
                </div>
            
                <!-- Schifting -->
                <div class="sec-label">Schiftingsvraag</div>
                <div class="schifting-card">
                <div class="schifting-title">⏱ Aankomsttijd winnaar</div>
                <div class="schifting-desc">Schiftingsvraag: wie zit het dichtst bij de exacte aankomsttijd?</div>
                <div class="field" style="margin:0">
                    <label for="tijd">Voorspelde aankomsttijd</label>
                    <input type="time" id="tijd" step="1" placeholder="hh:mm:ss">
                </div>
                </div>
            
                <!-- Indienen -->
                <div class="sec-label">Indienen</div>
                <p class="error" id="error-msg">⚠ Niet alles is ingevuld!</p>
                <button id="toevoegen">Inzending indienen</button>
            
            </div>
            </main>
        <footer class="border-top">
            <p>© 2026 Kobe Vannieuwenhuyze - Scouts &amp; Gidsen Deerlijk</p>
        </footer>
    </body>
</html>
