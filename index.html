<!DOCTYPE html>

<html lang="nl-NL">
    <head>
        <meta charset="utf-8" />
        <title>Lotjes de Ronde</title>
        <link rel="stylesheet" href="index.css" />
        <script src="index.js" type="module"></script>
    </head>
    <body>
        <main>
            <!-- Success screen (verborgen tot na submit) -->
            <div class="success-screen" id="success-screen">
                <div class="success-icon">🎉</div>
                <h2>Inzending opgeslagen!</h2>
                <p id="success-naam"></p>
                <button class="btn-new" onclick="resetForm()">Nieuwe inzending</button>
            </div>
            
            <!-- Form -->
            <div id="form-wrap">
            
                <div class="sec-label">Gegevens</div>
            
                <div class="field">
                <label for="naam">Naam</label>
                <input type="text" id="naam" placeholder="bv. Kobe Vannieuwenhuyze" autocomplete="name">
                </div>
            
                <div class="field">
                <label for="gsm">GSM</label>
                <input type="tel" id="gsm" placeholder="bv. 0471 58 41 60" autocomplete="tel">
                </div>
            
                <div class="sec-label">Top 3 renners</div>
                <p style="font-size:.78rem;color:var(--muted);margin-bottom:.9rem;line-height:1.5;">
                Volgorde maakt niet uit.
                </p>
            
                <div class="top3">
                <div class="renner-row">
                    <div class="renner-badge r1">1</div>
                    <div class="field" style="margin:0;flex:1">
                    <label for="renner1">Renner 1</label>
                    <div class="select-wrap">
                        <select id="renner1"><option value="">— Renner selecteren —</option></select>
                    </div>
                    </div>
                </div>
            
                <div class="renner-row">
                    <div class="renner-badge r2">2</div>
                    <div class="field" style="margin:0;flex:1">
                    <label for="renner2">Renner 2</label>
                    <div class="select-wrap">
                        <select id="renner2"><option value="">— Renner selecteren —</option></select>
                    </div>
                    </div>
                </div>
            
                <div class="renner-row">
                    <div class="renner-badge r3">3</div>
                    <div class="field" style="margin:0;flex:1">
                    <label for="renner3">Renner 3</label>
                    <div class="select-wrap">
                        <select id="renner3"><option value="">— Renner selecteren —</option></select>
                    </div>
                    </div>
                </div>
                </div>
            
                <div class="sec-label">Schiftingsvraag</div>
            
                <div class="schifting-card">
                <div class="schifting-title">⏱ Aankomsttijd winnaar</div>
                <div class="schifting-desc">Schiftingsvraag bij gelijke stand: wie zit het dichtst bij de exacte aankomsttijd?</div>
                <div class="field" style="margin:0">
                    <label for="tijd">Voorspelde aankomsttijd (hh:mm:ss)</label>
                    <input type="time" id="tijd" step="1" placeholder="hh:mm:ss">
                </div>
                </div>
            
                <div class="sec-label" style="margin-top:1.4rem;">Indienen</div>
            
                <p class="error" id="error-msg">⚠ Niet alles is ingevuld!</p>
                <button id="toevoegen">Inzending indienen</button>
            </div>
        </main>
        <footer class="border-top">
                <p>@ 2026 Kobe Vannieuwenhuyze</p>
        </footer>
    </body>
</html>
