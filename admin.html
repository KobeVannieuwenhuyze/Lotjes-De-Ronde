<!DOCTYPE html>

<html lang="nl-NL">
    <head>
        <meta charset="utf-8" />
        <title>Lotjes de Ronde</title>
        <link rel="stylesheet" href="admin.css" />
        <script src="admin.js" type="module"></script>
    </head>
    <body>
        <main>
        <!-- ── AANKOMSTTIJD ── -->
        <div class="sec-label">Schiftingsvraag — aankomsttijd winnaar</div>
        <div class="tijd-card">
            <div class="tijd-label">⏱ Aankomsttijd</div>
            <input class="tijd-input" type="time" id="aankomsttijd"
            step="1" placeholder="hh:mm:ss">
            <span class="tijd-saved" id="tijd-saved">✓ Opgeslagen</span>
        </div>
        
        <!-- ── RENNERS ── -->
        <div class="sec-label">Renners &amp; uitslag</div>
        <div class="table-wrap">
            <table>
            <thead>
                <tr>
                <th>#</th>
                <th>Naam renner</th>
                <th style="text-align:center;width:100px">Punten</th>
                <th></th>
                </tr>
            </thead>
            <tbody id="renners-body"></tbody>
            </table>
        </div>
        <div class="save-status" id="save-status"></div>
        
        <!-- ── RANGSCHIKKING ── -->
        <div class="sec-label">Rangschikking deelnemers</div>
        <div class="rang-wrap">
            <table>
            <thead>
                <tr>
                <th style="width:2.5rem;text-align:center">#</th>
                <th>Naam</th>
                <th>GSM</th>
                <th style="text-align:center">Score</th>
                <th style="text-align:center">Schiftingstijd</th>
                </tr>
            </thead>
            <tbody id="rang-body">
                <tr><td colspan="5" class="geen-data">Nog geen uitslag beschikbaar.</td></tr>
            </tbody>
            </table>
        </div>

        <!-- ── POPUP MODAL ── -->
        <div class="modal-overlay" id="modal-overlay" onclick="sluitModal(event)">
            <div class="modal" id="modal">
            <button class="modal-close" onclick="sluitModal()">✕</button>
            <div class="modal-rang" id="modal-rang"></div>
            <div class="modal-naam" id="modal-naam"></div>
            <div class="modal-row">
                <span class="modal-key">GSM</span>
                <span class="modal-val" id="modal-gsm"></span>
            </div>
            <div class="modal-row">
                <span class="modal-key">Renners</span>
                <div class="modal-renners" id="modal-renners"></div>
            </div>
            <div class="modal-row">
                <span class="modal-key">Score</span>
                <span class="modal-val accent" id="modal-score"></span>
            </div>
            <div class="modal-row">
                <span class="modal-key">Schiftingstijd</span>
                <span class="modal-val" id="modal-tijd"></span>
            </div>
            <div class="modal-row">
                <span class="modal-key">Ingediend op</span>
                <span class="modal-val" id="modal-datum"></span>
            </div>
            </div>
        </div>
        
        </main>
        <footer>
            <p>© 2026 Kobe Vannieuwenhuyze - Scouts &amp; Gidsen Deerlijk</p>
        </footer>
    </body>
</html>
