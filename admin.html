<!DOCTYPE html>

<html lang="nl-NL">
    <head>
        <meta charset="utf-8" />
        <title>Lotjes de Ronde</title>
        <link rel="stylesheet" href="index.css" />
        <script src="admin.js" type="module"></script>
    </head>
    <body>
        <main>
        <!-- ── AANKOMSTTIJD ── -->
        <div class="sec-label">Schiftingsvraag — aankomsttijd winnaar</div>
        <div class="tijd-card">
            <div class="tijd-label">⏱ Aankomsttijd</div>
            <input class="tijd-input" type="text" id="aankomsttijd"
            placeholder="hh:mm:ss" maxlength="8" inputmode="numeric">
            <span class="tijd-saved" id="tijd-saved">✓ Opgeslagen</span>
        </div>
        
        <!-- ── RENNERS ── -->
        <div class="sec-label">Renners &amp; uitslag</div>
        <div class="table-wrap">
            <table>
            <thead>
                <tr>
                <th>#</th>
                <th>Naam renner</th>
                <th style="text-align:center">Punten</th>
                <th></th>
                </tr>
            </thead>
            <tbody id="renners-body"></tbody>
            </table>
        </div>
        <div class="save-status" id="save-status"></div>
        
        <!-- ── WINNAARS ── -->
        <div class="sec-label">Winnaars</div>
        <div class="rang-wrap">
            <table>
            <thead>
                <tr>
                <th style="width:2.5rem;text-align:center">#</th>
                <th>Deelnemer</th>
                <th style="text-align:right">Score / Schifting</th>
                </tr>
            </thead>
            <tbody id="rang-body">
                <tr><td colspan="3" class="geen-data">Nog geen uitslag beschikbaar.</td></tr>
            </tbody>
            </table>
        </div>
        </main>
        
        <footer>
        <p>© 2026 Kobe Vannieuwenhuyze</p>
        </footer>
    </body>
</html>
